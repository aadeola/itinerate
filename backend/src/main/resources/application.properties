spring.application.name=itinerate

# LLM planner — requires a running llm-proxy (see README) or any OpenAI-compatible endpoint.
# Set ITINERARY_LLM_API_KEY (any non-empty value when using the local Cursor proxy).
itinerary.llm.api-key=${ITINERARY_LLM_API_KEY:}
itinerary.llm.base-url=${ITINERARY_LLM_BASE_URL:http://localhost:8081/v1}
itinerary.llm.model=${ITINERARY_LLM_MODEL:composer-2.5}

# Screenshot-to-activity vision feature — uses Google Gemini (Google AI Studio).
# Set ITINERARY_VISION_API_KEY to your Google AI Studio key to enable it.
itinerary.vision.api-key=${ITINERARY_VISION_API_KEY:}
itinerary.vision.base-url=${ITINERARY_VISION_BASE_URL:https://generativelanguage.googleapis.com}
itinerary.vision.model=${ITINERARY_VISION_MODEL:gemini-2.5-flash}
itinerary.vision.maps-resolve-url=${ITINERARY_VISION_MAPS_RESOLVE_URL:http://localhost:8081/v1/maps/resolve}

# Itinerary map geocoding — Google Geocoding REST API (same key as llm-proxy GOOGLE_MAPS_API_KEY).
itinerary.geocoding.api-key=${ITINERARY_GEOCODING_API_KEY:}
itinerary.geocoding.base-url=${ITINERARY_GEOCODING_BASE_URL:https://geocode.googleapis.com/v4/geocode}

# Comma-separated list of allowed CORS origins for the frontend dev server.
itinerary.cors.allowed-origins=${ITINERARY_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# Scrapbook persistence (H2 file database + local image storage).
spring.datasource.url=jdbc:h2:file:./data/itinerate
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=85MB
itinerary.scrapbook.upload-dir=${ITINERARY_SCRAPBOOK_UPLOAD_DIR:uploads/scrapbooks}
itinerary.scrapbook.max-files-per-upload=10
itinerary.scrapbook.max-file-size-bytes=8388608
